<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliação psicossocial</title>
  <meta name="description"
    content="Plataforma web profissional para preenchimento de questionários de avaliação do paciente com cálculo automático e geração de PDF." />
  <style>
    :root {
      --bg: #f4f8ff;
      --panel: #ffffff;
      --panel-soft: #eef5ff;
      --primary: #1565c0;
      --primary-2: #1e88e5;
      --primary-3: #0d47a1;
      --text: #11304d;
      --muted: #5d7690;
      --line: #d7e6fb;
      --ok: #1b8f5a;
      --warn: #e49b07;
      --danger: #d94c4c;
      --shadow: 0 16px 44px rgba(21, 101, 192, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #edf5ff 0%, #f8fbff 100%);
    }

    body {
      min-height: 100vh;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 14px 42px;
    }

    .hero {
      background: linear-gradient(180deg, #ffffff 0%, #f6faff 100%);
      color: var(--text);
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(21, 101, 192, 0.08);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 180px;
      height: 180px;
      background: rgba(30, 136, 229, 0.08);
      border-radius: 50%;
      filter: blur(4px);
    }

    .hero-top {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
      text-align: center;
      min-height: 110px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.08;
      color: var(--primary);
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      max-width: 800px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .hero-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .hero-badge {
      background: rgba(21, 101, 192, 0.08);
      border: 1px solid rgba(21, 101, 192, 0.12);
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-3);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(21, 101, 192, 0.08);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .sidebar {
      position: sticky;
      top: 14px;
      padding: 18px;
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 800;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .field input,
    .field textarea {
      border: 1px solid var(--line);
      background: #fbfdff;
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.12);
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .nav-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .nav-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f6faff 100%);
      padding: 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      color: var(--text);
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(21, 101, 192, 0.08);
    }

    .nav-btn.active {
      border-color: var(--primary-2);
      box-shadow: 0 12px 28px rgba(21, 101, 192, 0.14);
    }

    .nav-kicker {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .nav-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .nav-desc {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .progress-pill {
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--primary-3);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .content {
      padding: 20px;
      min-height: 70vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
    }

    .title-wrap h2 {
      margin: 0 0 6px;
      font-size: clamp(22px, 4vw, 32px);
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
      max-width: 780px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      box-shadow: 0 12px 24px rgba(21, 101, 192, 0.18);
    }

    .btn-secondary {
      background: #eef5ff;
      color: var(--primary-3);
      border: 1px solid var(--line);
    }

    .btn-ghost {
      background: transparent;
      color: var(--primary-3);
      border: 1px dashed var(--line);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-height: 120px;
    }

    .summary-card .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .summary-card .value {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 900;
      color: var(--primary-3);
      line-height: 1;
    }

    .summary-card .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 12px;
      margin-top: 10px;
    }

    .status-ok {
      background: rgba(27, 143, 90, 0.12);
      color: var(--ok);
    }

    .status-warn {
      background: rgba(228, 155, 7, 0.14);
      color: #9c6800;
    }

    .status-danger {
      background: rgba(217, 76, 76, 0.12);
      color: var(--danger);
    }

    .progress-rail {
      width: 100%;
      height: 10px;
      background: #e8f0fb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #67b7ff);
      border-radius: inherit;
      width: 0;
      transition: width .25s ease;
    }

    .question-list {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: #fff;
    }

    .question-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .question-number {
      width: 36px;
      min-width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--panel-soft);
      color: var(--primary-3);
      font-weight: 900;
      font-size: 14px;
    }

    .question-text {
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      border: 1px solid var(--line);
      background: #fcfeff;
      border-radius: 14px;
      padding: 0;
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .option:hover {
      transform: translateY(-1px);
    }

    .option input {
      display: none;
    }

    .option label {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px;
      cursor: pointer;
      width: 100%;
      min-height: 58px;
    }

    .dot {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border-radius: 50%;
      border: 2px solid #b5ccec;
      position: relative;
      background: #fff;
      transition: border-color .2s ease;
    }

    .option input:checked+label .dot {
      border-color: var(--primary-2);
    }

    .option input:checked+label .dot::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--primary-2);
    }

    .option input:checked+label {
      background: linear-gradient(180deg, #f8fbff 0%, #edf5ff 100%);
    }

    .option.selected {
      border-color: var(--primary-2);
      box-shadow: 0 12px 26px rgba(21, 101, 192, 0.08);
    }

    .option-main {
      flex: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 14px;
    }

    .option-points {
      color: var(--primary-3);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .result-box {
      margin-top: 18px;
      background: linear-gradient(180deg, #0d47a1 0%, #1565c0 100%);
      color: #fff;
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .result-box h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .result-box p {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.65;
      font-size: 14px;
    }

    .result-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .metric {
      border-radius: 18px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .metric .k {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.78);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .metric .v {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 900;
    }

    .metric .d {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.5;
    }

    .footnote {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      background: #f8fbff;
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .empty-state {
      border: 1px dashed var(--line);
      background: #f8fbff;
      border-radius: 20px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    .footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .result-metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 12px 10px 28px;
      }

      .hero {
        padding: 18px;
        border-radius: 22px;
      }

      .sidebar,
      .content {
        padding: 16px;
      }

      .summary-grid,
      .result-metrics {
        grid-template-columns: 1fr;
      }

      .actions {
        width: 100%;
      }

      .actions .btn {
        width: 100%;
      }

      .option-main {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-btn {
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <section class="hero panel">
      <div class="hero-top">
        <div>
          <h1>Avaliação Psicossocial</h1>
          <p>Belara Saúde Ocupacional</p>
        </div>
      </div>
    </section>

    <div class="main-grid">
      <aside class="panel sidebar">
        <h3 class="section-title">Dados do atendimento</h3>

        <div class="form-grid">
          <div class="field">
            <label for="patientName">Nome</label>
            <input id="patientName" type="text" placeholder="Nome da pessoa avaliada" required />
          </div>
          <div class="field">
            <label for="patientCpf">CPF</label>
            <input id="patientCpf" type="text" placeholder="Digite o CPF" autocomplete="off" />
          </div>
          <div class="field">
            <label for="attendanceDate">Data</label>
            <input id="attendanceDate" type="date" required />
          </div>
          <div class="field">
            <label for="notes">Observações do atendimento</label>
            <textarea id="notes" placeholder="Observações livres para constarem no PDF"></textarea>
          </div>
        </div>

        <div class="nav-list" id="navList"></div>

        <button class="btn btn-primary" id="btnFullPdf" style="width:100%;margin-top:16px;"
          onclick="generateFullPdf()">Gerar PDF completo (todos os questionários)</button>
      </aside>

      <main class="panel content">
        <div id="app"></div>
        <div class="footer">Plataforma web responsiva com cálculo automático, salvamento local no navegador e geração de
          PDF por questionário.</div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script>
    const questionnaires = {
      srq20: {
        id: 'srq20',
        shortTitle: 'SRQ-20',
        title: 'Questionário SRQ-20 – Avaliação do Sofrimento Mental',
        description: 'Questões relacionadas a dores, sintomas ou problemas que podem ter surgido ou incomodado nos últimos 30 dias.',
        instruction: 'Assinale SIM se o problema se aplicou a você nos últimos 30 dias. Assinale NÃO se não se aplicou a você.',
        footnote: 'Todo escore superior ao ponto de corte 6/7 indica presença de sintomas psiquiátricos menores.',
        options: [
          { key: 'sim', label: 'Sim', points: 1 },
          { key: 'nao', label: 'Não', points: 0 }
        ],
        questions: [
          'Sente-se nervoso, tenso ou preocupado?',
          'Assusta-se com facilidade?',
          'Sente-se triste ultimamente?',
          'Você chora mais do que de costume?',
          'Tem dores de cabeça frequentemente?',
          'Você dorme mal?',
          'Você sente desconforto estomacal?',
          'Você tem má digestão?',
          'Você tem falta de apetite?',
          'Tem tremores nas mãos?',
          'Você se cansa com facilidade?',
          'Tem dificuldade em tomar decisões?',
          'Tem dificuldade em ter satisfação em suas tarefas?',
          'Seu trabalho lhe traz sofrimento?',
          'Sente-se cansado em todo o tempo?',
          'Tem dificuldade de pensar claramente?',
          'Sente-se incapaz de desempenhar papel útil em sua vida?',
          'Tem perdido o interesse pelas coisas?',
          'Tem pensado em dar fim à sua vida?',
          'Sente-se inútil em sua vida?'
        ],
        calculate(responses) {
          const total = Object.values(responses).reduce((sum, v) => sum + (v === 'sim' ? 1 : 0), 0);
          const thresholdReached = total >= 7;
          return {
            answered: Object.keys(responses).length,
            totalQuestions: 20,
            score: total,
            maxScore: 20,
            scoreLabel: total + ' / 20',
            scoreDescription: 'Total de respostas SIM',
            interpretation: thresholdReached
              ? 'Acima do ponto de corte (>= 7 respostas SIM assinaladas): o instrumento indica presença de sintomas psiquiátricos menores.'
              : 'Abaixo do ponto de corte (< 7 respostas SIM assinaladas): o instrumento não ultrapassou o ponto de corte informado no arquivo.',
            status: thresholdReached ? 'danger' : 'ok',
            metrics: [
              { label: 'Pontuação', value: total.toString(), description: 'Soma das respostas SIM nas 20 questões.' },
              { label: 'Ponto de corte', value: '7', description: 'Critério indicado no arquivo enviado.' },
              { label: 'Classificação', value: thresholdReached ? 'Presença de sintomas psiquiátricos menores' : 'Dentro da normalidade', description: thresholdReached ? 'Acima do ponto de corte.' : 'Abaixo do ponto de corte.' }
            ],
            pdfSummary: [
              ['Pontuação total', total + ' / 20'],
              ['Ponto de corte', '7 respostas SIM'],
              ['Resultado', thresholdReached ? 'Acima do ponto de corte' : 'Abaixo do ponto de corte']
            ]
          };
        }
      },
      estresse: {
        id: 'estresse',
        shortTitle: 'Nível de estresse',
        title: 'Questionário de Avaliação de Nível de Estresse',
        description: 'Instrumento com 26 questões sobre sintomas percebidos nos últimos 6 meses.',
        instruction: 'Assinale uma opção de Nunca (1) a Muito frequente (5), conforme o que você efetivamente vem sentindo nos últimos seis meses.',
        footnote: 'Média A = média das questões 1 a 14 multiplicada por 2; Média B = média das questões 15 a 26; Média C = (Média A + Média B) / 2. Interpretação: 1,0 a 2,0 ausência de estresse; 2,1 a 3,5 estresse leve a moderado; 3,6 a 4,5 estresse intenso; 4,6 a > 5 estresse muito intenso.',
        options: [
          { key: '1', label: 'Nunca', points: 1 },
          { key: '2', label: 'Raramente', points: 2 },
          { key: '3', label: 'Às vezes', points: 3 },
          { key: '4', label: 'Frequentemente', points: 4 },
          { key: '5', label: 'Muito frequente', points: 5 }
        ],
        questions: [
          'Nervosismo.',
          'Ansiedade (sensação de vazio, lacuna, hiato entre o agora e o futuro, associação a medo/apreensão em relação ao futuro).',
          'Dificuldade de concentração no trabalho.',
          'Ímpetos de raiva.',
          'Angústia (aflição, sensação de impotência diante de problemas que lhe afligem – problema de qualquer natureza).',
          'Fadiga (baixo nível de energia, sentir o corpo um “bagaço”, sentir-se cansado precocemente ao longo do dia, sonolência).',
          'Irritabilidade fácil (irritação sem motivos, aparente).',
          'Períodos de depressão (tristeza, apatia, isolamento e falta de energia).',
          'Dor de cabeça por tensão.',
          'Insônia (dificuldade de conseguir dormir, sono entrecortado, acordar de madrugada e ter dificuldade em dormir de novo).',
          'Dor nos músculos do pescoço e ombros.',
          'Dor discreta no peito sob tensão.',
          'Palpitação (sentir o coração bater forte em alguns momentos).',
          'Indisposição gástrica ou dor no estômago que se acentuam diante de exigências emocionais.',
          'Nó na garganta (sensação de sufocamento).',
          'Tontura, vertigem.',
          'Falta ou excesso de apetite.',
          'Perda e/ou oscilação do senso de humor.',
          'Sentimento de incapacidade para os enfrentamentos, anteriormente considerados tranquilos.',
          'Evitar e sentir dificuldade de lidar com as pessoas.',
          'Uso de cigarros para aliviar a tensão.',
          'Uso de bebidas alcoólicas para aliviar a tensão.',
          'Uso de tranquilizantes (medicamentos).',
          'Uso de outras drogas (maconha, cocaína etc.).',
          'Pânico – sensação de estar fora de si e/ou do mundo, medo de perder o controle das situações, podendo acarretar sintomas como palpitação, sensação de falta de ar, sufocação, dor no peito, náuseas, tontura, sensação de desmaio, formigamento nos dedos, ondas de frio ou calor, boca seca.',
          'Dificuldades na esfera sexual.'
        ],
        calculate(responses) {
          const values = Array.from({ length: 26 }, (_, i) => Number(responses[String(i + 1)] || 0));
          const first = values.slice(0, 14);
          const second = values.slice(14);
          const mean1 = first.reduce((a, b) => a + b, 0) / 14;
          const mean2 = second.reduce((a, b) => a + b, 0) / 12;
          const mediaA = mean1 * 2;
          const mediaB = mean2;
          const mediaC = (mediaA + mediaB) / 2;

          let interpretation = 'Ausência de estresse';
          let status = 'ok';
          if (mediaC >= 4.6) {
            interpretation = 'Estresse muito intenso';
            status = 'danger';
          } else if (mediaC >= 3.6) {
            interpretation = 'Estresse intenso';
            status = 'danger';
          } else if (mediaC >= 2.1) {
            interpretation = 'Estresse leve a moderado';
            status = 'warn';
          }

          const format = (n) => n.toFixed(2).replace('.', ',');
          const rawSum = values.reduce((a, b) => a + b, 0);
          return {
            answered: Object.keys(responses).length,
            totalQuestions: 26,
            score: mediaC,
            maxScore: 5,
            scoreLabel: format(mediaC),
            scoreDescription: 'Média C do instrumento',
            interpretation: interpretation + '.',
            status,
            metrics: [
              { label: 'Média A', value: format(mediaA), description: 'Média das questões 1 a 14 multiplicada por 2.' },
              { label: 'Média B', value: format(mediaB), description: 'Média das questões 15 a 26.' },
              { label: 'Média C', value: format(mediaC), description: 'Resultado final do instrumento.' },
              { label: 'Classificação', value: interpretation, description: 'Faixa interpretativa conforme o arquivo.' }
            ],
            pdfSummary: [
              ['Soma bruta das respostas', rawSum.toString()],
              ['Média A', format(mediaA)],
              ['Média B', format(mediaB)],
              ['Média C', format(mediaC)],
              ['Resultado', interpretation]
            ]
          };
        }
      },
      personalidade: {
        id: 'personalidade',
        shortTitle: 'Personalidade tensa',
        title: 'Auto-avaliação Sumária de Personalidade Tensa',
        description: 'Instrumento de 10 itens com respostas A, B e C e pontuação conforme o formulário enviado.',
        instruction: 'Marque a resposta que mais se assemelha à sua realidade, baseando-se no que ocorre com você na atualidade.',
        footnote: 'Forma de Pontuação: 2 pontos para cada resposta C, 1 ponto para cada resposta B e 0 ponto para cada resposta A. Interpretação: 0 a 12 personalidade não tensa (0-6 pessoa calma, fleumática e tranquila, 7-12 enquadrado na normalidade); mais de 12 tenso; 16 ou mais muito tenso.',
        optionsPerQuestion: [
          [
            { key: 'a', label: 'Não (a)', points: 0 },
            { key: 'b', label: 'Mais ou menos (b)', points: 1 },
            { key: 'c', label: 'Sim (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Sim (a)', points: 0 },
            { key: 'b', label: 'Mais ou menos (b)', points: 1 },
            { key: 'c', label: 'Não (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Não (a)', points: 0 },
            { key: 'b', label: 'Mais ou menos (b)', points: 1 },
            { key: 'c', label: 'Sim (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Não (a)', points: 0 },
            { key: 'b', label: 'Às vezes (b)', points: 1 },
            { key: 'c', label: 'Sim (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Nunca (a)', points: 0 },
            { key: 'b', label: 'Raramente (b)', points: 1 },
            { key: 'c', label: 'Frequentemente (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Discordo (a)', points: 0 },
            { key: 'b', label: 'Às vezes (b)', points: 1 },
            { key: 'c', label: 'Concordo (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Não (a)', points: 0 },
            { key: 'b', label: 'Mais ou menos (b)', points: 1 },
            { key: 'c', label: 'Sim (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Não (a)', points: 0 },
            { key: 'b', label: 'Mais ou menos (b)', points: 1 },
            { key: 'c', label: 'Sim (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Não (a)', points: 0 },
            { key: 'b', label: 'Mais ou menos (b)', points: 1 },
            { key: 'c', label: 'Sim (c)', points: 2 }
          ],
          [
            { key: 'a', label: 'Ocasionalmente (a)', points: 0 },
            { key: 'b', label: 'Às vezes (b)', points: 1 },
            { key: 'c', label: 'Na maioria das vezes (c)', points: 2 }
          ]
        ],
        questions: [
          'Irrito-me com facilidade mesmo diante de pequenas contrariedades.',
          'Consigo voltar à calma com grande rapidez, mesmo diante de situações de grande transtorno emocional (irritabilidade, explosões).',
          'Costumo estabelecer prazo para tudo o que tenho que fazer, mesmo quando não há necessidade de estabelecê-los.',
          'O não cumprimento de prazos (entrega de trabalhos, relatórios, atrasos nos horários de compromissos, atrasos de viagem) costuma me deixar inquieto e contrariado.',
          'Em situações em que me sinto irritado, costumo dar respostas atravessadas, que firam as pessoas (ou tenho ímpetos de ter esse tipo de comportamento).',
          'Não se pode abrir mão das oportunidades que nos aparecem na vida.',
          'Pensar em alguns eventos que ocorrem durante o dia às vezes me coloca tenso e inquieto.',
          'Diante de situações ou tarefas difíceis, costumo ficar trêmulo ou transpirar, ou ter uma sensação de discreta tontura.',
          'Numa reunião ou numa palestra, quando não estou falando nem me movimentando, fico fazendo rabiscos numa folha de papel.',
          'Esforço-me por fazer o máximo possível, e por não deixar que as coisas se compliquem, seja em casa, seja no trabalho.'
        ],
        calculate(responses) {
          let total = 0;
          for (let i = 1; i <= 10; i++) {
            const answer = responses[String(i)];
            const option = this.optionsPerQuestion[i - 1].find(o => o.key === answer);
            total += option ? option.points : 0;
          }

          let interpretation = 'Pessoa calma, fleumática e tranquila';
          let status = 'ok';
          if (total >= 16) {
            interpretation = 'Muito tenso';
            status = 'danger';
          } else if (total > 12) {
            interpretation = 'Tenso';
            status = 'danger';
          } else if (total >= 7) {
            interpretation = 'Pessoa não tensa';
            status = 'warn';
          }

          return {
            answered: Object.keys(responses).length,
            totalQuestions: 10,
            score: total,
            maxScore: 20,
            scoreLabel: total + ' / 20',
            scoreDescription: 'Pontuação total do instrumento',
            interpretation: interpretation + '.',
            status,
            metrics: [
              { label: 'Pontuação total', value: total.toString(), description: '2 pontos para C, 1 para B e 0 para A.' },
              { label: 'Faixa', value: interpretation, description: 'Classificação calculada conforme o formulário.' },
              { label: 'Normalidade', value: '0 a 12', description: 'Faixa considerada não tensa no instrumento.' }
            ],
            pdfSummary: [
              ['Pontuação total', total + ' / 20'],
              ['Critério', '2 para C, 1 para B e 0 para A'],
              ['Resultado', interpretation]
            ]
          };
        }
      }
    };

    const storageKey = 'avaliacao-psicossocial-v1';
    const state = {
      active: 'srq20',
      patientName: '',
      patientCpf: '',
      attendanceDate: '',

      notes: '',
      responses: {
        srq20: {},
        estresse: {},
        personalidade: {}
      }
    };

    const navList = document.getElementById('navList');
    const app = document.getElementById('app');
    const patientName = document.getElementById('patientName');
    const patientCpf = document.getElementById('patientCpf');
    const attendanceDate = document.getElementById('attendanceDate');
    const notes = document.getElementById('notes');

    function saveState() {
      // Mantem os dados somente enquanto a pagina esta aberta.
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
        if (!saved) return;
        Object.assign(state, saved);
        state.responses = saved.responses || state.responses;
      } catch (error) {
        console.warn('Não foi possível carregar o estado salvo.', error);
      }
    }

    function hydrateFields() {
      patientName.value = state.patientName || '';
      patientCpf.value = state.patientCpf || '';
      if (!state.attendanceDate) state.attendanceDate = getTodayDate();
      attendanceDate.value = state.attendanceDate;
      notes.value = state.notes || '';
    }

    function getTodayDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatDate(value) {
      if (!value) return 'Não informado';
      const [y, m, d] = value.split('-');
      if (!y || !m || !d) return value;
      return [d, m, y].join('/');
    }

    function answeredCount(id) {
      return Object.keys(state.responses[id] || {}).length;
    }

    function completionPercent(id) {
      const q = questionnaires[id];
      return Math.round((answeredCount(id) / q.questions.length) * 100);
    }

    function getCurrentOptions(q, index) {
      return q.optionsPerQuestion ? q.optionsPerQuestion[index] : q.options;
    }

    function buildStatusBadge(status, text) {
      const cls = status === 'danger' ? 'status-danger' : status === 'warn' ? 'status-warn' : 'status-ok';
      return `<span class="status-badge ${cls}">${text}</span>`;
    }

    function renderNav() {
      const entries = Object.values(questionnaires).map(q => {
        const active = state.active === q.id ? 'active' : '';
        const progress = completionPercent(q.id);
        return `
          <button class="nav-btn ${active}" onclick="goTo('${q.id}')">
            <div class="nav-kicker">
              <span>${q.shortTitle}</span>
              <span class="progress-pill">${answeredCount(q.id)}/${q.questions.length}</span>
            </div>
            <div class="nav-title">${q.title}</div>
            <div class="nav-desc">${q.description}</div>
            <div class="progress-rail"><div class="progress-bar" style="width:${progress}%"></div></div>
          </button>
        `;
      }).join('');
      navList.innerHTML = entries;
    }

    function renderQuestions(q) {
      const list = q.questions.map((text, index) => {
        const questionId = String(index + 1);
        const value = state.responses[q.id][questionId];
        const options = getCurrentOptions(q, index);
        const optionsHTML = options.map((option, optIndex) => {
          const checked = value === option.key ? 'checked' : '';
          const selected = value === option.key ? 'selected' : '';
          const inputId = `${q.id}-${questionId}-${optIndex}`;
          const pointsText = q.id === 'srq20' ? (option.points ? 'Conta 1 ponto' : 'Conta 0 ponto') : `Pontuação: ${option.points}`;
          return `
            <div class="option ${selected}">
              <input type="radio" id="${inputId}" name="${q.id}-${questionId}" value="${option.key}" ${checked} onclick="setAnswer('${q.id}','${questionId}','${option.key}')" />
              <label for="${inputId}">
                <span class="dot"></span>
                <span class="option-main">
                  <span>${option.label}</span>
                  <span class="option-points">${pointsText}</span>
                </span>
              </label>
            </div>
          `;
        }).join('');

        return `
          <article class="question-card">
            <div class="question-head">
              <div class="question-number">${index + 1}</div>
              <div class="question-text">${text}</div>
            </div>
            <div class="options">${optionsHTML}</div>
          </article>
        `;
      }).join('');

      return `<div class="question-list">${list}</div>`;
    }

    function resultBlock(q, result) {
      const metrics = result.metrics.map(m => `
        <div class="metric">
          <div class="k">${m.label}</div>
          <div class="v">${m.value}</div>
          <div class="d">${m.description}</div>
        </div>
      `).join('');

      return `
        <section class="result-box" aria-live="polite">
          <h3>Resultado do atendimento</h3>
          <p>${result.interpretation}</p>
          <div class="result-metrics">${metrics}</div>
        </section>
      `;
    }

    function topSummary(q, result) {
      const percent = completionPercent(q.id);
      const badgeText = result ? result.interpretation : 'Responda todas as perguntas para liberar o fechamento e o PDF.';
      const badge = buildStatusBadge(result ? result.status : 'warn', badgeText);

      return `
        <section class="summary-grid">
          <article class="summary-card">
            <div class="label">Progresso</div>
            <div class="value">${answeredCount(q.id)}/${q.questions.length}</div>
            <div class="hint">Perguntas respondidas neste instrumento.</div>
            <div class="progress-rail"><div class="progress-bar" style="width:${percent}%"></div></div>
          </article>
          <article class="summary-card">
            <div class="label">Pontuação principal</div>
            <div class="value">${result ? result.scoreLabel : '--'}</div>
            <div class="hint">${result ? result.scoreDescription : 'Disponível após responder tudo.'}</div>
          </article>
          <article class="summary-card">
            <div class="label">Status</div>
            <div>${badge}</div>
            <div class="hint">A interpretação é atualizada automaticamente quando o formulário fica completo.</div>
          </article>
          <article class="summary-card">
            <div class="label">PDF</div>
            <div class="value">2 pág.</div>
            <div class="hint">1ª página com respostas marcadas e 2ª página com os resultados do atendimento.</div>
          </article>
        </section>
      `;
    }

    function render() {
      const q = questionnaires[state.active];
      const isComplete = answeredCount(q.id) === q.questions.length;
      const result = isComplete ? q.calculate.call(q, state.responses[q.id]) : null;
      const html = `
        <section class="topbar">
          <div class="title-wrap">
            <h2>${q.title}</h2>
            <p>${q.description} ${q.instruction}</p>
          </div>
          <div class="actions">
            <button class="btn btn-secondary" onclick="clearCurrentQuestionnaire()">Limpar respostas desta aba</button>
            <button class="btn btn-primary" onclick="finishQuestionnaire()">Finalizar questionário e gerar PDF</button>
          </div>
        </section>

        ${topSummary(q, result)}

        ${renderQuestions(q)}

        ${result ? resultBlock(q, result) : '<div class="empty-state">Preencha todas as questões para visualizar o resultado calculado e habilitar o fechamento completo do atendimento.</div>'}

        <div class="footnote"><strong>Observação técnica do instrumento:</strong> ${q.footnote}</div>
      `;
      app.innerHTML = html;
      renderNav();
    }

    function goTo(id) {
      state.active = id;
      location.hash = id;
      saveState();
      render();
    }

    function setAnswer(questionnaireId, questionId, value) {
      if (!state.responses[questionnaireId]) state.responses[questionnaireId] = {};
      state.responses[questionnaireId][questionId] = value;
      saveState();
      render();
    }

    function clearCurrentQuestionnaire() {
      const q = questionnaires[state.active];
      const ok = window.confirm(`Deseja limpar todas as respostas de "${q.shortTitle}"?`);
      if (!ok) return;
      state.responses[q.id] = {};
      saveState();
      render();
    }

    function sanitizeFilename(text) {
      return (text || 'atendimento')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '')
        .toLowerCase();
    }

    function getResponseLabel(q, questionIndex, storedValue) {
      const options = getCurrentOptions(q, questionIndex);
      const found = options.find(o => o.key === storedValue);
      return found ? found.label : '-';
    }

    function validateRequiredAttendanceFields() {
      if (state.patientName.trim() && state.attendanceDate) return true;

      if (!state.patientName.trim()) {
        patientName.focus();
        patientName.reportValidity();
        return false;
      }

      attendanceDate.focus();
      attendanceDate.reportValidity();
      return false;
    }

    async function finishQuestionnaire() {
      if (!validateRequiredAttendanceFields()) return;

      const q = questionnaires[state.active];
      const isComplete = answeredCount(q.id) === q.questions.length;
      if (!isComplete) {
        window.alert(`Ainda faltam ${q.questions.length - answeredCount(q.id)} resposta(s) em ${q.shortTitle}.`);
        return;
      }
      const result = q.calculate.call(q, state.responses[q.id]);
      await generatePdf(q, result);
    }

    async function generatePdf(q, result) {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        window.alert('A biblioteca de PDF não carregou corretamente. Verifique sua conexão e tente novamente.');
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 14;

      const patient = state.patientName || 'Não informado';
      const date = formatDate(state.attendanceDate);
      const observation = state.notes || 'Sem observações registradas.';

      doc.setFillColor(13, 71, 161);
      doc.roundedRect(margin, 12, pageWidth - margin * 2, 28, 5, 5, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('Atendimento psicossocial', margin + 8, 24);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'normal');
      doc.text(q.title, margin + 8, 32);

      const cpf = state.patientCpf || 'Não informado';
      doc.setTextColor(17, 48, 77);
      doc.setFillColor(245, 249, 255);
      doc.roundedRect(margin, 46, pageWidth - margin * 2, 34, 4, 4, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.text('Dados do atendimento', margin + 6, 54);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.text(`Nome: ${patient}`, margin + 6, 61);
      doc.text(`CPF: ${cpf}`, margin + 6, 67);
      doc.text(`Data: ${date}`, pageWidth / 2, 61);

      const observationLines = doc.splitTextToSize(`Observações: ${observation}`, pageWidth - margin * 2 - 12);
      doc.text(observationLines, margin + 6, 75);

      const rows = q.questions.map((question, index) => [
        String(index + 1),
        question,
        getResponseLabel(q, index, state.responses[q.id][String(index + 1)])
      ]);

      if (doc.autoTable) {
        doc.autoTable({
          startY: 88,
          head: [['#', 'Pergunta', 'Resposta marcada']],
          body: rows,
          theme: 'grid',
          styles: { font: 'helvetica', fontSize: 9, textColor: [17, 48, 77], cellPadding: 2.8, lineColor: [215, 230, 251] },
          headStyles: { fillColor: [21, 101, 192], textColor: [255, 255, 255], fontStyle: 'bold' },
          columnStyles: {
            0: { cellWidth: 10 },
            1: { cellWidth: 125 },
            2: { cellWidth: 36 }
          },
          margin: { left: margin, right: margin }
        });
      } else {
        let y = 84;
        doc.setFont('helvetica', 'bold');
        doc.text('Perguntas e respostas', margin, y);
        y += 8;
        doc.setFont('helvetica', 'normal');
        rows.forEach(row => {
          const text = `${row[0]}. ${row[1]} — ${row[2]}`;
          const lines = doc.splitTextToSize(text, pageWidth - margin * 2);
          doc.text(lines, margin, y);
          y += lines.length * 5 + 3;
        });
      }

      doc.addPage();
      doc.setFillColor(21, 101, 192);
      doc.rect(0, 0, pageWidth, 38, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(20);
      doc.text('Resultado do atendimento', margin, 22);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'normal');
      doc.text(q.shortTitle + ' • cálculo automático do formulário', margin, 30);

      const colorMap = {
        ok: [27, 143, 90],
        warn: [228, 155, 7],
        danger: [217, 76, 76]
      };
      const accent = colorMap[result.status] || colorMap.warn;

      doc.setTextColor(17, 48, 77);
      doc.setFillColor(245, 249, 255);
      doc.roundedRect(margin, 46, pageWidth - margin * 2, 46, 5, 5, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.text('Interpretação', margin + 6, 56);
      doc.setDrawColor(...accent);
      doc.setFillColor(...accent);
      doc.roundedRect(pageWidth - 70, 50, 48, 12, 4, 4, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(10);
      doc.text(result.status === 'ok' ? 'Estável' : result.status === 'warn' ? 'Atenção' : 'Alerta', pageWidth - 58, 58);
      doc.setTextColor(17, 48, 77);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(11);
      const interpretationLines = doc.splitTextToSize(result.interpretation, pageWidth - margin * 2 - 12);
      doc.text(interpretationLines, margin + 6, 70);

      const metricBoxes = result.metrics.slice(0, 4);
      let startY = 104;
      const gap = 8;
      const boxWidth = (pageWidth - margin * 2 - gap) / 2;
      metricBoxes.forEach((metric, idx) => {
        const x = margin + (idx % 2) * (boxWidth + gap);
        const y = startY + Math.floor(idx / 2) * 38;
        doc.setFillColor(255, 255, 255);
        doc.setDrawColor(215, 230, 251);
        doc.roundedRect(x, y, boxWidth, 30, 4, 4, 'FD');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.setTextColor(93, 118, 144);
        doc.text(metric.label, x + 4, y + 8);
        doc.setTextColor(13, 71, 161);
        doc.setFontSize(18);
        const metricLines = doc.splitTextToSize(String(metric.value), boxWidth - 8);
        doc.text(metricLines, x + 4, y + 18);
      });

      const summaryStartY = 188;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.setTextColor(17, 48, 77);
      doc.text('Resumo técnico', margin, summaryStartY);

      if (doc.autoTable) {
        doc.autoTable({
          startY: summaryStartY + 4,
          head: [['Indicador', 'Resultado']],
          body: result.pdfSummary,
          theme: 'striped',
          styles: { font: 'helvetica', fontSize: 10, cellPadding: 3 },
          headStyles: { fillColor: [13, 71, 161], textColor: [255, 255, 255] },
          margin: { left: margin, right: margin }
        });
      }

      doc.setFont('helvetica', 'italic');
      doc.setFontSize(9);
      doc.setTextColor(93, 118, 144);
      const finalNote = doc.splitTextToSize('Este PDF foi gerado automaticamente a partir do preenchimento do questionário nesta aplicação web. O instrumento serve como apoio ao atendimento e a interpretação final deve respeitar o contexto clínico e ocupacional do caso.', pageWidth - margin * 2);
      doc.text(finalNote, margin, pageHeight - 16);

      const fileName = `${sanitizeFilename(q.shortTitle)}-${sanitizeFilename(patient || 'atendimento')}.pdf`;
      doc.save(fileName);
    }

    async function generateFullPdf() {
      if (!validateRequiredAttendanceFields()) return;

      if (!window.jspdf || !window.jspdf.jsPDF) {
        window.alert('A biblioteca de PDF não carregou corretamente. Verifique sua conexão e tente novamente.');
        return;
      }

      const allQs = Object.values(questionnaires);
      const answeredQs = allQs.filter(q => answeredCount(q.id) > 0);
      if (answeredQs.length === 0) {
        window.alert('Nenhum questionário possui respostas. Preencha pelo menos um questionário antes de gerar o PDF completo.');
        return;
      }

      const partials = answeredQs.filter(q => answeredCount(q.id) < q.questions.length);
      if (partials.length > 0) {
        const names = partials.map(q => `${q.shortTitle} (${answeredCount(q.id)}/${q.questions.length})`).join(', ');
        const proceed = window.confirm(`Alguns questionários estão incompletos: ${names}.\n\nDeseja gerar o PDF completo mesmo assim? Os incompletos sairão sem o cálculo de resultado.`);
        if (!proceed) return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 14;

      const patient = state.patientName || 'Não informado';
      const cpf = state.patientCpf || 'Não informado';
      const date = formatDate(state.attendanceDate);
      const observation = state.notes || 'Sem observações registradas.';

      // ===== CAPA =====
      doc.setFillColor(13, 71, 161);
      doc.rect(0, 0, pageWidth, 70, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(22);
      doc.text('Questionários de avaliação do paciente', margin, 32);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(12);
      doc.text('Relatório consolidado de todos os instrumentos respondidos', margin, 42);
      doc.setFontSize(10);
      doc.text(`Gerado em ${new Date().toLocaleString('pt-BR')}`, margin, 52);

      doc.setTextColor(17, 48, 77);
      doc.setFillColor(245, 249, 255);
      doc.roundedRect(margin, 84, pageWidth - margin * 2, 50, 5, 5, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(13);
      doc.text('Dados do atendimento', margin + 6, 94);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(11);
      doc.text(`Nome: ${patient}`, margin + 6, 104);
      doc.text(`CPF: ${cpf}`, margin + 6, 112);
      doc.text(`Data: ${date}`, pageWidth / 2, 104);
      const obsLines = doc.splitTextToSize(`Observações: ${observation}`, pageWidth - margin * 2 - 12);
      doc.text(obsLines, margin + 6, 122);

      // Índice dos instrumentos
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(13);
      doc.text('Instrumentos incluídos neste relatório', margin, 152);

      const indexRows = answeredQs.map((q, i) => {
        const total = q.questions.length;
        const ans = answeredCount(q.id);
        const status = ans === total ? 'Completo' : `Parcial (${ans}/${total})`;
        return [String(i + 1), q.shortTitle, q.title, status];
      });

      if (doc.autoTable) {
        doc.autoTable({
          startY: 156,
          head: [['#', 'Código', 'Instrumento', 'Status']],
          body: indexRows,
          theme: 'grid',
          styles: { font: 'helvetica', fontSize: 10, textColor: [17, 48, 77], cellPadding: 3, lineColor: [215, 230, 251] },
          headStyles: { fillColor: [21, 101, 192], textColor: [255, 255, 255], fontStyle: 'bold' },
          margin: { left: margin, right: margin }
        });
      }

      doc.setFont('helvetica', 'italic');
      doc.setFontSize(9);
      doc.setTextColor(93, 118, 144);
      doc.text('Este relatório consolidado reúne respostas e resultados calculados automaticamente pela plataforma.', margin, pageHeight - 16);

      // ===== POR QUESTIONÁRIO =====
      for (let qi = 0; qi < answeredQs.length; qi++) {
        const q = answeredQs[qi];
        const complete = answeredCount(q.id) === q.questions.length;
        const result = complete ? q.calculate.call(q, state.responses[q.id]) : null;

        // Cabeçalho do instrumento
        doc.addPage();
        doc.setFillColor(13, 71, 161);
        doc.roundedRect(margin, 12, pageWidth - margin * 2, 28, 5, 5, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(16);
        doc.text(q.shortTitle, margin + 8, 24);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        const titleLines = doc.splitTextToSize(q.title, pageWidth - margin * 2 - 16);
        doc.text(titleLines, margin + 8, 32);

        // Bloco paciente reduzido
        doc.setTextColor(17, 48, 77);
        doc.setFillColor(245, 249, 255);
        doc.roundedRect(margin, 46, pageWidth - margin * 2, 18, 4, 4, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.text(`Paciente: ${patient}`, margin + 6, 53);
        doc.text(`CPF: ${cpf}`, margin + 6, 60);
        doc.setFont('helvetica', 'normal');
        doc.text(`Data: ${date}`, pageWidth / 2, 53);

        // Tabela de respostas
        const rows = q.questions.map((question, index) => {
          const stored = state.responses[q.id][String(index + 1)];
          return [String(index + 1), question, stored ? getResponseLabel(q, index, stored) : '—'];
        });

        if (doc.autoTable) {
          doc.autoTable({
            startY: 72,
            head: [['#', 'Pergunta', 'Resposta']],
            body: rows,
            theme: 'grid',
            styles: { font: 'helvetica', fontSize: 9, textColor: [17, 48, 77], cellPadding: 2.6, lineColor: [215, 230, 251] },
            headStyles: { fillColor: [21, 101, 192], textColor: [255, 255, 255], fontStyle: 'bold' },
            columnStyles: { 0: { cellWidth: 10 }, 1: { cellWidth: 125 }, 2: { cellWidth: 36 } },
            margin: { left: margin, right: margin }
          });
        }

        // Página de resultado (só se completo)
        if (result) {
          doc.addPage();
          doc.setFillColor(21, 101, 192);
          doc.rect(0, 0, pageWidth, 38, 'F');
          doc.setTextColor(255, 255, 255);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(18);
          doc.text('Resultado — ' + q.shortTitle, margin, 22);
          doc.setFontSize(11);
          doc.setFont('helvetica', 'normal');
          doc.text('Cálculo automático do formulário', margin, 30);

          const colorMap = { ok: [27, 143, 90], warn: [228, 155, 7], danger: [217, 76, 76] };
          const accent = colorMap[result.status] || colorMap.warn;

          doc.setTextColor(17, 48, 77);
          doc.setFillColor(245, 249, 255);
          doc.roundedRect(margin, 46, pageWidth - margin * 2, 46, 5, 5, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.text('Interpretação', margin + 6, 56);
          doc.setDrawColor(accent[0], accent[1], accent[2]);
          doc.setFillColor(accent[0], accent[1], accent[2]);
          doc.roundedRect(pageWidth - 70, 50, 48, 12, 4, 4, 'F');
          doc.setTextColor(255, 255, 255);
          doc.setFontSize(10);
          doc.text(result.status === 'ok' ? 'Estável' : result.status === 'warn' ? 'Atenção' : 'Alerta', pageWidth - 58, 58);
          doc.setTextColor(17, 48, 77);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(11);
          const interpLines = doc.splitTextToSize(result.interpretation, pageWidth - margin * 2 - 12);
          doc.text(interpLines, margin + 6, 70);

          const metricBoxes = result.metrics.slice(0, 4);
          let startY = 104;
          const gap = 8;
          const boxWidth = (pageWidth - margin * 2 - gap) / 2;
          metricBoxes.forEach((metric, idx) => {
            const x = margin + (idx % 2) * (boxWidth + gap);
            const y = startY + Math.floor(idx / 2) * 38;
            doc.setFillColor(255, 255, 255);
            doc.setDrawColor(215, 230, 251);
            doc.roundedRect(x, y, boxWidth, 30, 4, 4, 'FD');
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(10);
            doc.setTextColor(93, 118, 144);
            doc.text(metric.label, x + 4, y + 8);
            doc.setTextColor(13, 71, 161);
            doc.setFontSize(16);
            const metricLines = doc.splitTextToSize(String(metric.value), boxWidth - 8);
            doc.text(metricLines, x + 4, y + 18);
          });

          const summaryStartY = 188;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.setTextColor(17, 48, 77);
          doc.text('Resumo técnico', margin, summaryStartY);

          if (doc.autoTable) {
            doc.autoTable({
              startY: summaryStartY + 4,
              head: [['Indicador', 'Resultado']],
              body: result.pdfSummary,
              theme: 'striped',
              styles: { font: 'helvetica', fontSize: 10, cellPadding: 3 },
              headStyles: { fillColor: [13, 71, 161], textColor: [255, 255, 255] },
              margin: { left: margin, right: margin }
            });
          }

          doc.setFont('helvetica', 'italic');
          doc.setFontSize(9);
          doc.setTextColor(93, 118, 144);
          const footLines = doc.splitTextToSize(q.footnote || '', pageWidth - margin * 2);
          doc.text(footLines, margin, pageHeight - 16);
        } else {
          // observação de incompleto na própria página de respostas
          const yEnd = (doc.lastAutoTable && doc.lastAutoTable.finalY) ? doc.lastAutoTable.finalY + 8 : 200;
          doc.setFont('helvetica', 'italic');
          doc.setFontSize(10);
          doc.setTextColor(217, 76, 76);
          doc.text('Questionário incompleto — o resultado não foi calculado.', margin, yEnd);
        }
      }

      // Rodapé com numeração
      const pageCount = doc.internal.getNumberOfPages();
      for (let p = 1; p <= pageCount; p++) {
        doc.setPage(p);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(93, 118, 144);
        doc.text(`Página ${p} de ${pageCount}`, pageWidth - margin, pageHeight - 6, { align: 'right' });
      }

      const fileName = `relatorio-completo-${sanitizeFilename(patient || 'atendimento')}.pdf`;
      doc.save(fileName);
    }

    patientName.addEventListener('input', (e) => { state.patientName = e.target.value; saveState(); });
    patientCpf.addEventListener('input', (e) => { state.patientCpf = e.target.value; saveState(); });
    attendanceDate.addEventListener('input', (e) => { state.attendanceDate = e.target.value; saveState(); });
    notes.addEventListener('input', (e) => { state.notes = e.target.value; saveState(); });

    window.goTo = goTo;
    window.setAnswer = setAnswer;
    window.finishQuestionnaire = finishQuestionnaire;
    window.clearCurrentQuestionnaire = clearCurrentQuestionnaire;
    window.generateFullPdf = generateFullPdf;

    function boot() {
      localStorage.removeItem(storageKey);
      loadState();
      state.active = (location.hash || '#srq20').replace('#', '') || 'srq20';
      if (!questionnaires[state.active]) state.active = 'srq20';
      hydrateFields();
      render();
    }

    window.addEventListener('hashchange', () => {
      const next = (location.hash || '').replace('#', '');
      if (questionnaires[next]) {
        state.active = next;
        saveState();
        render();
      }
    });

    boot();
  </script>
</body>

</html>
